name: Daily Listings Scrape

# Walks the MorphMarket crested-geckos grid in delta mode: scan pages
# newest-first, upsert each, stop once a whole page is already in the
# DB. Mirrors the recipe that the original Desktop/geckscrape archive
# proved out (ordering=-first_posted URL + premium proxy + the
# wait/scroll_to_bottom/wait browser_actions sequence). The
# mark_unseen_listings_inactive sweep stays off in delta mode; sold
# listings get flipped to is_active=false by scrape_details.py when
# their detail page returns 404 or 410.
on:
  schedule:
    - cron: '0 9 * * *'   # 9 AM UTC daily
  workflow_dispatch:

# Serialise with scrape-listings-weekly-resync.yml so a manual dispatch
# or retry storm can't have both running against the same listings rows
# at the same time.
concurrency:
  group: scrape-listings
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Most daily walks stop after 1-3 pages once the early-exit hits.
    # The ceiling protects us if MorphMarket changes their grid again
    # and the script can't recognise already-seen rows.
    timeout-minutes: 60
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scrape_listings.py
        env:
          DECODO_AUTH: ${{ secrets.DECODO_AUTH }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRIGGERED_BY: github_action
          DELTA_WALK: '1'
        working-directory: scripts
        run: python scrape_listings.py
