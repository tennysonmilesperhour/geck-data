name: Weekly Images Download

on:
  schedule:
    - cron: '0 11 * * 1'   # Mondays 11 AM UTC
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run download_images.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRIGGERED_BY: github_action
        working-directory: scripts
        run: python download_images.py

      - name: Notify Discord on failure
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/notify-failure
        with:
          webhook-url: ${{ secrets.DISCORD_OPS_WEBHOOK }}
          context: "Weekly image download did not complete."
