name: Hourly Listings Delta

# Runs a DELTA_WALK of the listings grid on an hourly cadence so new
# listings show up in `/data-admin` within ~1 hour of being posted on
# MorphMarket. (A separate daily workflow used to run the identical
# walk at 09:00; it was fully redundant with this one and was removed.)
#
# Most hourly runs delta-exit on page 1 (~30s wall, 1 Decodo credit)
# because no new listings have appeared since the previous hour. On a
# spike day with >24 listings/hour the walk continues to page 2 or 3
# until it sees a known listing, costing 2-3 credits for that hour.
#
# Cost envelope: ~720-900 credits/month at the steady state we have
# today (~10-20 new listings/day). Well inside the 19k Decodo cap.
#
# Conflicts with scrape-listings-weekly-resync.yml at 03:00 UTC Sunday.
# The shared `scrape-listings` concurrency group serialises them so the
# second arrival waits its turn; the dupe walk just delta-exits
# immediately because the first run already bumped last_seen_at on
# page-1 listings.
on:
  # PAUSED 2026-07-15: every hourly run was failing in a Decodo HTTP 429
  # storm (Decodo's API rejects every request on page 1, attempt 1 — quota
  # still reading exhausted or the DECODO_AUTH secret no longer matches the
  # resubscribed account). Schedule disabled until the Decodo auth/quota is
  # diagnosed and fixed. Re-enable by uncommenting the two lines below.
  # workflow_dispatch stays on so we can still trigger manual diagnosis runs.
  #
  # schedule:
  #   - cron: '0 * * * *'   # top of every hour, UTC
  workflow_dispatch:

# Stay grouped with the weekly resync workflow so we never have two
# scrape_listings runs writing to listings/scrape_runs in parallel.
concurrency:
  group: scrape-listings
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Most runs finish in <60s. The 15-min ceiling fails fast if
    # Decodo wedges or MorphMarket breaks the recipe again.
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scrape_listings.py
        env:
          DECODO_AUTH: ${{ secrets.DECODO_AUTH }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TRIGGERED_BY: github_action_hourly
          DELTA_WALK: '1'
        working-directory: scripts
        run: python scrape_listings.py

      - name: Notify Discord on failure
        if: ${{ failure() || cancelled() }}
        uses: ./.github/actions/notify-failure
        with:
          webhook-url: ${{ secrets.DISCORD_OPS_WEBHOOK }}
          context: "Hourly listings delta did not complete. If the log shows a 429 storm, check the Decodo quota/subscription first."
